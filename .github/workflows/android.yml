k
ame: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Godot
      run: |
        wget https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
        unzip Godot_v4.2-stable_linux.x86_64.zip
        chmod +x Godot_v4.2-stable_linux.x86_64

        mkdir -p ~/.local/share/godot/export_templates/4.2.stable
        wget https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_export_templates.tpz
        unzip Godot_v4.2-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.stable

    - name: Create Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
        -storepass android -alias androiddebugkey \
        -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
        -dname "CN=Android Debug,O=Android,C=US"

    - name: Export APK
      run: |
        mkdir -p build
        ./Godot_v4.2-stable_linux.x86_64 --headless \
        --export-debug "Android" build/game.apk

    - name: Verify APK Exists
      run: |
        ls -la build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ProjectHorizonAPK
        path: build/game.apk
